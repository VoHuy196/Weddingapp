<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wedding-app</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Use the special %BASE_URL% variable so that Vite will replace it with
      the value of `base` when building. This avoids hard‑coding leading
      slashes that point to the host root and instead respects the repo path.
      After build the tag will reference the compiled JS in `dist/assets`.
    -->
    <script type="module" src="%BASE_URL%src/main.tsx"></script>
  </body>
</html>
